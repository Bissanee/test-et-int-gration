name: CI

on:
  push:
    branches:
      - dev  # déclenche sur dev

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vérification syntaxique
        run: python -m compileall src/

      - name: Installer dépendances
        run: pip install -r requirements.txt

      - name: Lancer tests
        run: pytest -v

  deploy-to-main:
    name: Fast-forward main <- dev
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Récupérer main
        run: git fetch origin main:main

      - name: Fast-forward main
        run: |
          git checkout main
          git merge --ff-only dev || echo "Fast-forward impossible"
          git push origin main || echo "Push refusé (main a avancé)"