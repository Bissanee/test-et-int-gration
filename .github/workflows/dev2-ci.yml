name: CI - dev2

on:
  push:
    branches:
      - dev2

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall src/

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  deploy-to-main:
    name: Fast-forward main
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main:main

      - name: Fast-forward main
        run: |
          git checkout main
          git merge --ff-only dev2
          git push origin main

  isolate-failure:
    name: Isolate failure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move to failures/ and reset dev2
        run: |
          git push origin ${{ github.sha }}:refs/heads/failures/${{ github.sha }}
          git push origin HEAD^:refs/heads/dev2 --force
