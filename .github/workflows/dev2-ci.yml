name: CI - dev2

on:
  push:
    branches:
      - dev2

concurrency:
  group: dev2-pipeline
  cancel-in-progress: false

jobs:
  test-and-ff:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall src/

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        id: run_tests
        run: pytest -v

      - name: Fast-forward main
        if: ${{ success() && steps.run_tests.outcome == 'success' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main:main
          git checkout main
          git merge --ff-only dev2
          git push origin main

      - name: Tests failed - create failure branch and rollback dev2
        if: ${{ always() && steps.run_tests.outcome == 'failure' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          UNIQUE_ID="${{ github.run_id }}"
          FAILURE_BRANCH="failures/${UNIQUE_ID}"
          PREV_SHA=$(git rev-parse HEAD@{1})

          git checkout dev2
          git checkout -b $FAILURE_BRANCH
          git push origin $FAILURE_BRANCH

          git checkout dev2
          git reset --hard $PREV_SHA
          git push origin dev2 --force-with-lease
